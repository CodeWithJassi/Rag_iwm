<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Report Desk — IWM Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Palette: cool slate. The three signal colours are reserved,
   always and only, for broker ratings. The interactive accent is
   violet precisely because no analyst reads violet as a rating.
   ============================================================ */
:root{
  --ink:#10141A; --panel:#171C24; --raise:#1F2732; --line:#2A323E;
  --text:#E6EAF0; --muted:#8892A4; --faint:#5B6577;
  --buy:#3FB68B; --hold:#C9A227; --sell:#E0655F;
  --accent:#8A7FE0; --accent-dim:#8A7FE022;
  --sans:'Instrument Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --rail:296px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); background:var(--ink); color:var(--text);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  display:grid; grid-template-rows:auto 1fr; height:100vh; overflow:hidden;
}
:focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:3px}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit;color:inherit;background:none;border:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}

/* ---------------------------------------------------------- top bar */
header{
  display:flex;align-items:center;gap:14px;
  padding:0 20px;height:52px;border-bottom:1px solid var(--line);background:var(--panel);
}
.mark{
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.14em;
  color:var(--ink);background:var(--text);padding:4px 7px;border-radius:3px;
}
.wordmark{font-weight:600;letter-spacing:-.01em}
.wordmark span{color:var(--faint);font-weight:400}
.spacer{flex:1}
.deep{
  display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);
  padding:6px 11px;border:1px solid var(--line);border-radius:20px;
}
.deep[data-on="1"]{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}
.switch{width:30px;height:17px;border-radius:9px;background:var(--line);position:relative;transition:background .15s}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--faint);transition:transform .15s,background .15s}
.deep[data-on="1"] .switch{background:var(--accent)}
.deep[data-on="1"] .switch::after{transform:translateX(13px);background:#fff}

.mode-group{display:flex;gap:0;border:1px solid var(--line);border-radius:20px;overflow:hidden}
.mode-btn{
  font-size:12px;padding:5px 13px;color:var(--muted);font-family:var(--sans);
  border-right:1px solid var(--line);transition:all .15s;cursor:pointer;
}
.mode-btn:last-child{border-right:none}
.mode-btn[aria-pressed="true"]{background:var(--accent-dim);color:var(--accent);font-weight:500}
.mode-btn:hover:not([aria-pressed="true"]){color:var(--text)}

.verbose{
  display:flex;align-items:center;gap:9px;font-size:13px;color:var(--muted);
  padding:6px 11px;border:1px solid var(--line);border-radius:20px;
}
.verbose[data-on="1"]{border-color:var(--accent);color:var(--text);background:var(--accent-dim)}
.verbose[data-on="1"] .switch{background:var(--accent)}
.verbose[data-on="1"] .switch::after{transform:translateX(13px);background:#fff}

.stop-btn{
  width:31px;height:31px;border-radius:7px;background:var(--sell);color:#fff;
  display:grid;place-items:center;font-size:13px;flex-shrink:0;
}
.stop-btn:hover{filter:brightness(1.2)}

.model-sel{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  background:var(--raise);border:1px solid var(--line);border-radius:5px;
  padding:4px 7px;cursor:pointer;outline:none;
}
.model-sel:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px}
.model-sel option{background:var(--panel);color:var(--text)}

/* ---------------------------------------------------------- shell */
main{display:grid;grid-template-columns:var(--rail) 1fr;overflow:hidden}
aside{
  border-right:1px solid var(--line);background:var(--panel);
  display:grid;grid-template-rows:auto minmax(0,1fr) auto minmax(0,auto);overflow:hidden;
}
.rail-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 10px;
}
.rail-title{
  font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--faint);
}
.icon-btn{
  width:24px;height:24px;border-radius:4px;color:var(--muted);
  display:grid;place-items:center;font-size:17px;line-height:1;
}
.icon-btn:hover{background:var(--raise);color:var(--text)}
/* Mini toggle for ingestion settings (table extraction) */
.mini-toggle{
  display:flex;align-items:center;gap:5px;font-size:10px;color:var(--faint);
  font-family:var(--mono);letter-spacing:.06em;padding:3px 7px;
  border:1px solid var(--line);border-radius:14px;cursor:pointer;
  transition:border-color .15s,color .15s;
}
.mini-toggle:hover{color:var(--muted)}
.mini-toggle[data-on="1"]{border-color:var(--accent);color:var(--accent)}
.mini-dot{
  width:9px;height:9px;border-radius:50%;background:var(--line);
  transition:background .15s;
}
.mini-toggle[data-on="1"] .mini-dot{background:var(--accent)}
.rail-list{overflow-y:auto;padding:0 10px 12px}

/* ---------------------------------------------------------- report card */
.card{
  position:relative;width:100%;text-align:left;
  padding:11px 12px 11px 15px;border-radius:6px;margin-bottom:4px;
  border:1px solid transparent;transition:background .12s;
}
.card::before{
  content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;
  background:var(--faint);
}
.card[data-rec="Buy"]::before{background:var(--buy)}
.card[data-rec="Hold"]::before{background:var(--hold)}
.card[data-rec="Sell"]::before{background:var(--sell)}
.card:hover{background:var(--raise)}
.card[aria-current="true"]{background:var(--raise);border-color:var(--line)}
.card-co{font-weight:500;letter-spacing:-.01em;margin-bottom:2px}
.card-meta{
  font-family:var(--mono);font-size:11px;color:var(--faint);
  display:flex;gap:7px;align-items:center;
}
.card-move{margin-left:auto;font-weight:500}
.card-x{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:3px;
  display:grid;place-items:center;font-size:13px;color:var(--faint);opacity:0;transition:opacity .12s}
.card:hover .card-x{opacity:1}
.card-x:hover{background:var(--line);color:var(--sell)}
.up{color:var(--buy)} .down{color:var(--sell)} .flat{color:var(--hold)}

.chip{
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;
  padding:1px 5px;border-radius:3px;border:1px solid var(--line);color:var(--muted);
}
.chip.working{color:var(--accent);border-color:var(--accent)}
.chip.failed{color:var(--sell);border-color:var(--sell)}

/* ---------------------------------------------------------- sessions */
.rail-split{border-top:1px solid var(--line)}
.sess-list{overflow-y:auto;padding:0 10px 12px;max-height:26vh}
.sess{
  width:100%;text-align:left;padding:7px 9px;border-radius:5px;
  display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;
}
.sess:hover{background:var(--raise);color:var(--text)}
.sess[aria-current="true"]{background:var(--raise);color:var(--text)}
.sess-t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sess-n{font-family:var(--mono);font-size:10px;color:var(--faint)}
.sess-x{opacity:1;font-size:15px;color:var(--faint);padding:0 2px}
.sess-x:hover{color:var(--sell)}

/* ---------------------------------------------------------- stage */
.stage{display:flex;flex-direction:column;overflow:hidden;background:var(--ink)}

.doc-head{padding:22px 32px 0;border-bottom:1px solid var(--line)}
.doc-top{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
.doc-co{font-size:23px;font-weight:600;letter-spacing:-.02em;line-height:1.2}
.doc-sub{
  font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:5px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.rec{
  font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.1em;
  padding:3px 8px;border-radius:3px;
}
.rec[data-rec="Buy"]{color:var(--buy);background:#3FB68B1a}
.rec[data-rec="Hold"]{color:var(--hold);background:#C9A2271a}
.rec[data-rec="Sell"]{color:var(--sell);background:#E0655F1a}

/* -------- SIGNATURE: the upside gauge. CMP -> target, drawn to scale. ------ */
.gauge{min-width:250px;margin-left:auto;padding-top:2px}
.gauge-pct{
  font-family:var(--mono);font-size:19px;font-weight:500;text-align:right;
  letter-spacing:-.02em;line-height:1;
}
.gauge-track{
  height:3px;background:var(--line);border-radius:2px;margin:9px 0 6px;position:relative;
}
.gauge-fill{
  position:absolute;left:0;top:0;bottom:0;border-radius:2px;background:currentColor;
  transition:width .5s cubic-bezier(.2,.7,.3,1);
}
.gauge-dot{
  position:absolute;top:50%;width:7px;height:7px;border-radius:50%;
  background:currentColor;transform:translate(-50%,-50%);
  transition:left .5s cubic-bezier(.2,.7,.3,1);
  box-shadow:0 0 0 3px var(--ink);
}
.gauge-ends{
  display:flex;justify-content:space-between;
  font-family:var(--mono);font-size:11px;color:var(--faint);
}

.tabs{display:flex;gap:2px;margin-top:18px}
.tab{
  padding:8px 13px;font-size:13px;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab:hover{color:var(--text)}
.tab[aria-selected="true"]{color:var(--text);border-bottom-color:var(--accent)}

.pane{flex:1;overflow-y:auto;padding:26px 32px}
.pane.hidden{display:none}

/* summary pane */
.summary{max-width:74ch;white-space:pre-wrap;color:#D2D8E1;line-height:1.65}
.summary strong{color:var(--text);font-weight:600}

/* ---------------------------------------------------------- chat */
.thread{max-width:78ch;display:flex;flex-direction:column;gap:22px}
.msg-user{
  align-self:flex-end;max-width:82%;background:var(--raise);
  border:1px solid var(--line);border-radius:12px 12px 3px 12px;padding:9px 14px;
}
.msg-bot{max-width:100%}
.bot-body{line-height:1.68;color:#D8DDE5}
.bot-body b{color:var(--text);font-weight:600}
.bot-body ul{margin:8px 0 8px 18px}
.bot-body li{margin:3px 0}
.abstain{color:var(--muted);font-style:italic}

.cite{
  font-family:var(--mono);font-size:11px;vertical-align:super;line-height:0;
  color:var(--accent);padding:0 1px;border-radius:2px;
}
.cite:hover{background:var(--accent-dim)}

.bot-foot{display:flex;gap:8px;align-items:center;margin-top:11px;flex-wrap:wrap}
.pill{
  font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--faint);
  border:1px solid var(--line);border-radius:12px;padding:3px 9px;
}
.pill:hover{color:var(--text);border-color:var(--muted)}
.pill[aria-expanded="true"]{color:var(--accent);border-color:var(--accent)}

.drawer{
  margin-top:11px;border-left:2px solid var(--line);padding-left:13px;
  display:flex;flex-direction:column;gap:11px;
}
.src{font-size:13px}
.src-head{
  font-family:var(--mono);font-size:10px;color:var(--faint);
  display:flex;gap:9px;margin-bottom:3px;
}
.src-num{color:var(--accent)}
.src-body{color:var(--muted);line-height:1.5}
.src-thumb{
  display:block;max-width:240px;max-height:180px;border-radius:6px;
  border:1px solid var(--line);margin-bottom:8px;object-fit:contain;
  background:var(--raise);
}
.src-thumb:hover{border-color:var(--accent)}

.plan{font-size:13px;color:var(--muted)}
.plan li{margin:3px 0 3px 16px}

/* trace panel — shown inline when verbose is on, no click needed */
.trace-panel{
  margin-top:14px;border:1px solid var(--line);border-radius:8px;
  background:var(--panel);overflow:hidden;
}
.trace-head{
  font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--muted);
  padding:8px 14px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
}
.trace-head span{color:var(--accent)}
.trace-steps{padding:6px 0}
.trace-step{
  display:flex;align-items:flex-start;gap:10px;padding:6px 14px;font-size:12px;
}
.trace-step+.trace-step{border-top:1px solid color-mix(in srgb,var(--line) 40%,transparent)}
.trace-label{
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--accent);
  padding:2px 6px;border:1px solid var(--accent-dim);border-radius:3px;
  min-width:80px;text-align:center;flex-shrink:0;background:var(--accent-dim);
}
.trace-label.gate{border-color:var(--sell);color:var(--sell);background:transparent}
.trace-summary{color:var(--text);flex:1;line-height:1.45}
.trace-detail{
  color:var(--muted);font-size:11px;margin-top:2px;word-break:break-word;
  max-height:200px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;
}
.trace-ms{font-family:var(--mono);font-size:9px;color:var(--faint);min-width:42px;text-align:right;flex-shrink:0}

.scores{display:flex;gap:18px;margin-top:11px}
.score-k{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.08em}
.score-v{font-family:var(--mono);font-size:13px;margin-top:2px}
.meter{width:70px;height:2px;background:var(--line);margin-top:5px;border-radius:2px}
.meter i{display:block;height:100%;border-radius:2px;background:var(--buy)}
.meter.bad i{background:var(--sell)}

/* agentic reasoning steps — lighter than answer text, collapsible */
.agentic-steps{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto}
.agentic-step{border-left:2px solid var(--line);padding-left:11px;transition:border-color .2s}
.agentic-step.step-pending{border-left-color:var(--accent)}
.agentic-step.step-error{border-left-color:var(--sell)}
.agentic-step.step-done{border-left-color:var(--faint)}
.step-header{display:flex;gap:8px;align-items:center;font-family:var(--mono);font-size:10px}
.step-num{color:var(--accent);font-weight:500}
.step-tool{color:var(--muted)}
.step-thought{font-size:12px;color:var(--muted);margin:4px 0;line-height:1.5}
.step-params{font-family:var(--mono);font-size:10px;color:var(--faint);margin:3px 0;word-break:break-all}
.step-result{font-size:12px;color:var(--text);margin:4px 0;line-height:1.5}
.step-live .step-header .dots{display:inline-flex;gap:3px;align-items:center}
.step-live .step-header .dots i{width:3px;height:3px;border-radius:50%;background:var(--accent);animation:blink 1.2s infinite}
.step-live .step-header .dots i:nth-child(2){animation-delay:.2s}
.step-live .step-header .dots i:nth-child(3){animation-delay:.4s}

/* composer */
.composer{border-top:1px solid var(--line);padding:14px 32px 20px;background:var(--ink)}
.box{
  max-width:78ch;display:flex;align-items:flex-end;gap:10px;
  border:1px solid var(--line);border-radius:10px;padding:9px 9px 9px 14px;
  background:var(--panel);transition:border-color .12s;
}
.box:focus-within{border-color:var(--accent)}
.box textarea{flex:1;resize:none;max-height:150px;line-height:1.5;padding:3px 0}
.box textarea::placeholder{color:var(--faint)}
.send{
  width:31px;height:31px;border-radius:7px;background:var(--accent);color:#fff;
  display:grid;place-items:center;font-size:15px;flex-shrink:0;
}
.send:disabled{background:var(--line);color:var(--faint);cursor:not-allowed}
.hint{
  max-width:78ch;font-family:var(--mono);font-size:10px;color:var(--faint);
  margin-top:8px;letter-spacing:.05em;
}

/* empty + status */
.empty{
  height:100%;display:grid;place-content:center;text-align:center;gap:8px;
  color:var(--faint);padding:40px;
}
.empty h2{font-size:16px;font-weight:500;color:var(--muted);letter-spacing:-.01em}
.empty p{font-size:13px;max-width:34ch}

.dots{display:inline-flex;gap:4px;align-items:center}
.dots i{width:4px;height:4px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}

.err{color:var(--sell);font-size:13px}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:820px){
  main{grid-template-columns:1fr}
  aside{display:none}
  .pane,.composer,.doc-head{padding-left:18px;padding-right:18px}
}
</style>
</head>
<body>

<header>
  <div class="mark">IWM</div>
  <div class="wordmark">Report Desk <span>· equity research</span></div>
  <div class="spacer"></div>
  <select class="model-sel" id="model-sel" aria-label="Select LLM model"></select>
  <div class="mode-group" id="mode-group" role="radiogroup" aria-label="Search mode">
    <button class="mode-btn" data-mode="normal" aria-pressed="true" role="radio">Normal</button>
    <button class="mode-btn" data-mode="deep" aria-pressed="false" role="radio">Deep</button>
    <button class="mode-btn" data-mode="agentic" aria-pressed="false" role="radio">Agentic</button>
  </div>
  <button class="verbose" id="verbose" data-on="0" aria-pressed="false">
    <span class="switch"></span> Verbose
  </button>
  <button class="deep" id="extract-tables-hdr" data-on="1" aria-pressed="true">
    <span class="switch"></span> Tables
  </button>
  <button class="deep" id="ocr-hdr" data-on="1" aria-pressed="true">
    <span class="switch"></span> Scan
  </button>
</header>

<main>
  <aside>
    <div class="rail-head">
      <div class="rail-title">REPORTS</div>
      <button class="icon-btn" id="add" title="Upload a report" aria-label="Upload a report">+</button>
    </div>
    <div class="rail-list" id="reports"></div>

    <div class="rail-head rail-split">
      <div class="rail-title">CHATS</div>
      <button class="icon-btn" id="newchat" title="Start a chat" aria-label="Start a chat">+</button>
    </div>
    <div class="sess-list" id="sessions"></div>
  </aside>

  <section class="stage" id="stage"></section>
</main>

<input type="file" id="picker" accept="application/pdf" hidden>

<script>
// ============================================================
// State. One report selected, one session inside it. Nothing else.
// ============================================================
const S = { reports: [], report: null, sessions: [], session: null, turns: [], mode: 'normal', verbose: false, busy: false, model: '', extract_tables: true, ocr: true };
let _abort = null;  // AbortController for in-flight chat fetch

// Sync S.verbose from the DOM toggle button so the JS state never drifts.
const syncToggles = () => {
  const verboseBtn = document.getElementById('verbose');
  if (verboseBtn) {
    S.verbose = verboseBtn.dataset.on === '1';
    verboseBtn.setAttribute('aria-pressed', String(S.verbose));
  }
};

const api = async (path, opts = {}) => {
  const r = await fetch('/api' + path, opts);
  if (r.status === 204) return null;
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
  return r.json();
};
const esc = s => (s ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
const money = n => n == null ? '—' : Number(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
const upside = r => (r.current_price && r.target_price) ? (r.target_price - r.current_price) / r.current_price * 100 : null;
const dirClass = p => p == null ? 'flat' : p > 1 ? 'up' : p < -1 ? 'down' : 'flat';
const dirVar = p => p == null ? 'var(--hold)' : p > 1 ? 'var(--buy)' : p < -1 ? 'var(--sell)' : 'var(--hold)';

// ============================================================
// Reports rail
// ============================================================
async function loadReports() {
  S.reports = await api('/reports');
  const el = document.getElementById('reports');
  if (!S.reports.length) {
    el.innerHTML = `<div style="padding:20px 6px;font-size:13px;color:var(--faint)">
      No reports yet. Upload a broker PDF to start.</div>`;
    return renderStage();
  }
  el.innerHTML = S.reports.map(r => {
    const p = upside(r);
    const ready = r.status === 'ready';
    const tail = ready
      ? (p == null ? '' : `<span class="card-move ${dirClass(p)}">${p > 0 ? '▲' : p < 0 ? '▼' : '■'} ${p.toFixed(1)}%</span>`)
      : `<span class="chip ${r.status === 'failed' ? 'failed' : 'working'}">${r.status.toUpperCase()}</span>`;
    return `<button class="card" data-id="${r.id}" data-rec="${r.recommendation || ''}"
              aria-current="${S.report?.id === r.id}">
        <span class="card-x" data-del="${r.id}" aria-label="Delete report">×</span>
        <div class="card-co">${esc(r.company)}</div>
        <div class="card-meta"><span>${esc(r.broker || r.file_name)}</span>${tail}</div>
      </button>`;
  }).join('');
  el.querySelectorAll('.card').forEach(b =>
    b.onclick = e => {
      const del = e.target.closest?.('.card-x');
      if (del && del.dataset.del) { e.stopPropagation(); return deleteReport(+del.dataset.del); }
      selectReport(+b.dataset.id);
    });

  // Anything still ingesting? Poll until it settles.
  if (S.reports.some(r => r.status === 'pending' || r.status === 'processing'))
    setTimeout(loadReports, 3000);
}

async function loadModels() {
  try {
    const models = await api('/models');
    const sel = document.getElementById('model-sel');
    sel.innerHTML = models.map(m =>
      `<option value="${m.id}" ${m.default ? 'selected' : ''}>${esc(m.label)}</option>`
    ).join('');
    S.model = sel.value;
    sel.onchange = () => { S.model = sel.value; };
  } catch (e) { /* non-critical; model selector stays empty */ }
}

async function selectReport(id) {
  S.report = await api(`/reports/${id}`);
  S.session = null; S.turns = [];
  await loadReports();
  await loadSessions();
  if (S.report.status === 'ready' && S.sessions.length) selectSession(S.sessions[0].id);
  else renderStage();
}

async function deleteReport(id) {
  if (!confirm('Delete this report, its chunks, all chats, and the PDF file? This cannot be undone.')) return;
  await api(`/reports/${id}`, { method: 'DELETE' });
  if (S.report?.id === id) { S.report = null; S.session = null; S.turns = []; }
  await loadReports();
  await loadSessions();
  renderStage();
}

// ============================================================
// Sessions — memory lives per (report, session)
// ============================================================
async function loadSessions() {
  const el = document.getElementById('sessions');
  if (!S.report) { S.sessions = []; el.innerHTML = ''; return; }
  S.sessions = await api(`/reports/${S.report.id}/sessions`);
  el.innerHTML = S.sessions.length ? S.sessions.map(s => `
    <button class="sess" data-id="${s.id}" aria-current="${S.session === s.id}">
      <span class="sess-t">${esc(s.title)}</span>
      <span class="sess-n">${s.n_turns}</span>
      <span class="sess-x" data-del="${s.id}" aria-label="Delete chat">×</span>
    </button>`).join('')
    : `<div style="padding:6px 9px;font-size:13px;color:var(--faint)">No chats yet.</div>`;

  el.querySelectorAll('.sess').forEach(b => b.onclick = e => {
    // closest() walks up from the clicked element (which may be a text node)
    // to find the .sess-x span with the data-del attribute.
    const del = e.target.closest?.('.sess-x');
    if (del && del.dataset.del) { e.stopPropagation(); return dropSession(+del.dataset.del); }
    selectSession(+b.dataset.id);
  });
}

async function newSession() {
  if (!S.report || S.report.status !== 'ready') return;
  const { id } = await api(`/reports/${S.report.id}/sessions`, { method: 'POST' });
  await selectSession(id);  // must await: otherwise the floating promise overwrites S.turns mid-send()
}
async function dropSession(id) {
  await api(`/sessions/${id}`, { method: 'DELETE' });
  if (S.session === id) { S.session = null; S.turns = []; }
  await loadSessions(); renderStage();
}
async function selectSession(id) {
  S.session = id;
  S.turns = await api(`/sessions/${id}/turns`);
  await loadSessions();
  renderStage('chat');
  scrollThread();
}

// ============================================================
// Stage
// ============================================================
let tab = 'summary';

function gauge(r) {
  const p = upside(r);
  if (p == null) return '';
  // Bar length is proportional to the move, capped at ±40% so an outlier
  // target does not flatten every other report's gauge into invisibility.
  const w = Math.min(Math.abs(p), 40) / 40 * 100;
  return `<div class="gauge" style="color:${dirVar(p)}">
    <div class="gauge-pct">${p > 0 ? '+' : ''}${p.toFixed(1)}%</div>
    <div class="gauge-track">
      <div class="gauge-fill" style="width:${w}%"></div>
      <div class="gauge-dot" style="left:${w}%"></div>
    </div>
    <div class="gauge-ends"><span>CMP ${money(r.current_price)}</span><span>TGT ${money(r.target_price)}</span></div>
  </div>`;
}

function renderStage(force) {
  const st = document.getElementById('stage');
  if (force) tab = force;

  if (!S.report) {
    st.innerHTML = `<div class="empty"><h2>Select a report</h2>
      <p>Pick a broker report on the left, or upload one to summarise and index it.</p></div>`;
    return;
  }
  if (S.report.status === 'failed') {
    st.innerHTML = `<div class="empty"><h2>Ingestion failed</h2>
      <p class="err">${esc((S.report.error || '').split('\n').pop())}</p>
      <p>Re-upload the PDF, or check that Ollama is reachable.</p></div>`;
    return;
  }
  if (S.report.status !== 'ready') {
    st.innerHTML = `<div class="empty"><h2>Indexing ${esc(S.report.company)}</h2>
      <p>Summarising, chunking and embedding. This takes a minute on CPU.</p>
      <span class="dots"><i></i><i></i><i></i></span></div>`;
    setTimeout(() => selectReport(S.report.id), 3000);
    return;
  }

  const r = S.report;
  st.innerHTML = `
    <div class="doc-head">
      <div class="doc-top">
        <div>
          <div class="doc-co">${esc(r.company)}</div>
          <div class="doc-sub">
            ${r.recommendation ? `<span class="rec" data-rec="${r.recommendation}">${r.recommendation.toUpperCase()}</span>` : ''}
            <span>${esc(r.broker || 'Unknown broker')}</span>
            <span>·</span><span>${new Date(r.uploaded_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: '2-digit' })}</span>
            <span>·</span><span>${r.n_chunks} chunks</span>
          </div>
        </div>
        ${gauge(r)}
      </div>
      <div class="tabs" role="tablist">
        <button class="tab" role="tab" data-t="summary" aria-selected="${tab === 'summary'}">Summary</button>
        <button class="tab" role="tab" data-t="chat" aria-selected="${tab === 'chat'}">Chat</button>
      </div>
    </div>

    <div class="pane ${tab === 'summary' ? '' : 'hidden'}" id="pane-summary">
      <div class="summary">${fmt(r.summary || 'No summary was generated.')}</div>
    </div>

    <div class="pane ${tab === 'chat' ? '' : 'hidden'}" id="pane-chat">
      <div class="thread" id="thread"></div>
    </div>

    ${tab === 'chat' ? `
    <div class="composer">
      <div class="box">
        <textarea id="q" rows="1" placeholder="Ask about ${esc(r.company)} — figures, thesis, risks, assumptions"></textarea>
        <button class="send" id="send" aria-label="Send">↑</button>
        <button class="stop-btn" id="stop" aria-label="Stop" style="display:none">■</button>
      </div>
      <div class="hint"></div>
    </div>` : ''}`;
  if (tab === 'chat') updateHint();

  st.querySelectorAll('.tab').forEach(t => t.onclick = () => renderStage(t.dataset.t));
  if (tab === 'chat') {
    renderThread();
    const q = document.getElementById('q');
    q.oninput = () => { q.style.height = 'auto'; q.style.height = Math.min(q.scrollHeight, 150) + 'px'; };
    q.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
    document.getElementById('send').onclick = send;
    document.getElementById('stop').onclick = stopChat;
    toggleComposerButtons(S.busy);
    q.focus();
  }
}

// Light markdown. A dependency for **bold** and bullets would be silly.
function fmt(t) {
  return esc(t)
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/^[-*•]\s+(.*)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '<br><br>');
}
// [3] -> a clickable superscript that opens the source drawer.
const citeify = t => t.replace(/\[(\d+)\]/g, '<button class="cite" data-n="$1">[$1]</button>');

function renderThread() {
  const el = document.getElementById('thread');
  if (!el) return;
  if (!S.session) {
    el.innerHTML = `<div class="empty"><h2>No chat open</h2>
      <p>Start a chat to ask questions about this report.</p></div>`;
    return;
  }
  el.innerHTML = S.turns.map(t => t.role === 'user'
    ? `<div class="msg-user">${esc(t.content)}</div>`
    : botHTML(t)).join('') + (S.busy ? `
      <div class="msg-bot"><span class="dots"><i></i><i></i><i></i></span></div>` : '');
  wireCites(el);
  toggleComposerButtons(S.busy);
}

function botHTML(t) {
  const cites = t.citations || [], subs = t.sub_questions || [], sc = t.scores;
  const trace = t.trace || [], rsteps = t.reasoning_steps || [];
  const live = t.live;
  const body = t.abstained
    ? `<div class="bot-body abstain">${esc(t.content)}</div>`
    : (live ? `<div class="agentic-steps"></div>` : `<div class="bot-body">${citeify(fmt(t.content))}</div>`);

  const foot = [];
  if (cites.length) foot.push(`<button class="pill" data-drawer="src-${t.id}" aria-expanded="false">${cites.length} SOURCES</button>`);
  if (subs.length > 1) foot.push(`<button class="pill" data-drawer="plan-${t.id}" aria-expanded="false">SEARCH PLAN · ${subs.length}</button>`);
  if (rsteps.length) foot.push(`<button class="pill" data-drawer="rs-${t.id}" aria-expanded="false">REASONING · ${rsteps.length} steps</button>`);

  const meter = (k, v) => `<div><div class="score-k">${k}</div>
    <div class="score-v">${(v * 100).toFixed(0)}%</div>
    <div class="meter ${v < .7 ? 'bad' : ''}"><i style="width:${v * 100}%"></i></div></div>`;

  return `<div class="msg-bot"${live ? ` data-turn-id="${t.id}"` : ''}>${body}
    ${!live && foot.length ? `<div class="bot-foot">${foot.join('')}</div>` : ''}
    ${!live && cites.length ? `<div class="drawer" id="src-${t.id}" hidden>${cites.map(c => `
      <div class="src">
        <div class="src-head"><span class="src-num">[${c.n}]</span>
          <span>PAGE ${c.page_no}</span>${c.section ? `<span>${esc(c.section)}</span>` : ''}
          ${c.chunk_type && c.chunk_type !== 'text' ? `<span class="chip">${c.chunk_type.toUpperCase()}</span>` : ''}
          <span>SIM ${c.similarity}</span></div>
        <div class="src-body">${c.chunk_type === 'image' ? `<a href="/api/images/${c.chunk_id}" target="_blank"><img src="/api/images/${c.chunk_id}" class="src-thumb" loading="lazy" alt="Chart from page ${c.page_no}"></a>` : ''}${esc(c.snippet)}…</div>
      </div>`).join('')}</div>` : ''}
    ${!live && subs.length > 1 ? `<div class="drawer plan" id="plan-${t.id}" hidden>
      <ul>${subs.map(s => `<li>${esc(s)}</li>`).join('')}</ul></div>` : ''}
    ${!live && trace.length && S.verbose ? `<div class="trace-panel">
      <div class="trace-head">🔍 PIPELINE TRACE <span>${trace.length} steps · ${trace[trace.length-1]?.ms || 0} ms total</span></div>
      <div class="trace-steps">
        ${trace.map(st => `
          <div class="trace-step">
            <span class="trace-label${st.summary.startsWith('GATED') ? ' gate' : ''}">${esc(st.label)}</span>
            <div style="flex:1;min-width:0">
              <div class="trace-summary">${esc(st.summary)}</div>
              ${st.detail ? `<div class="trace-detail">${esc(st.detail)}</div>` : ''}
            </div>
            <span class="trace-ms">${st.ms} ms</span>
          </div>`).join('')}
      </div>
    </div>` : ''}
    ${!live && rsteps.length ? `<div class="drawer" id="rs-${t.id}" hidden>
      <div class="agentic-steps" style="max-height:420px;overflow-y:auto">${rsteps.map(s => `
        <div class="agentic-step step-done">
          <div class="step-header">
            <span class="step-num">Step ${s.step}</span>
            <span class="step-tool">${esc(s.tool || '')}</span>
          </div>
          ${s.thought ? `<div class="step-thought">${esc(s.thought)}</div>` : ''}
          ${s.summary ? `<div class="step-result">${esc(s.summary)}</div>` : ''}
        </div>`).join('')}</div>
    </div>` : ''}
    ${!live && sc ? `<div class="scores">${meter('FAITHFULNESS', sc.faithfulness)}${meter('RELEVANCY', sc.relevancy)}</div>` : ''}
  </div>`;
}

function wireCites(root) {
  root.querySelectorAll('[data-drawer]').forEach(b => b.onclick = () => {
    const d = document.getElementById(b.dataset.drawer);
    d.hidden = !d.hidden;
    b.setAttribute('aria-expanded', String(!d.hidden));
  });
  // Clicking [3] in the prose opens that answer's source drawer.
  root.querySelectorAll('.cite').forEach(c => c.onclick = () => {
    const btn = c.closest('.msg-bot').querySelector('[data-drawer^="src-"]');
    if (btn && document.getElementById(btn.dataset.drawer).hidden) btn.click();
  });
}

const scrollThread = () => {
  const p = document.getElementById('pane-chat');
  if (p) p.scrollTop = p.scrollHeight;
};

// ============================================================
// Send
// ============================================================
async function send() {
  syncToggles();  // ensure S.verbose matches the DOM before sending
  const q = document.getElementById('q');
  const text = q.value.trim();
  if (!text || S.busy) return;

  if (!S.session) {
    // newSession → selectSession → renderStage recreates the textarea,
    // so save the query text before the DOM is replaced.
    await newSession();
    const newQ = document.getElementById('q');
    if (newQ) { newQ.value = text; newQ.style.height = 'auto'; newQ.style.height = Math.min(newQ.scrollHeight, 150) + 'px'; }
    return send();
  }

  q.value = ''; q.style.height = 'auto';
  S.turns.push({ role: 'user', content: text });
  S.busy = true; _abort = new AbortController();
  toggleComposerButtons(true);
  renderThread(); scrollThread();

  if (S.mode === 'agentic') {
    await sendAgentic(text);
  } else {
    await sendNormal(text);
  }
}

async function sendNormal(text) {
  try {
    const res = await api(`/sessions/${S.session}/chat`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text, deep_search: S.mode === 'deep', model: S.model, verbose: S.verbose }),
      signal: _abort.signal,
    });
    S.turns.push({
      id: Date.now(), role: 'assistant', content: res.answer, abstained: res.abstained,
      citations: res.citations, sub_questions: res.sub_questions, scores: res.scores,
      trace: res.trace || [],
    });
  } catch (e) {
    if (e.name === 'AbortError') {
      S.turns.push({ id: Date.now(), role: 'assistant', content: '⏹ Stopped.', abstained: true, trace: [] });
    } else {
      S.turns.push({ id: Date.now(), role: 'assistant', content: `Request failed: ${e.message}`, abstained: true, trace: [] });
    }
  } finally {
    S.busy = false; _abort = null;
    toggleComposerButtons(false);
    renderThread(); scrollThread(); loadSessions();
  }
}

async function sendAgentic(text) {
  // --- start the SSE stream ---
  let response;
  try {
    response = await fetch(`/api/sessions/${S.session}/chat-agentic`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: text, mode: 'agentic', model: S.model, verbose: S.verbose }),
      signal: _abort.signal,
    });
  } catch (e) {
    if (e.name === 'AbortError') {
      S.turns.push({ id: Date.now(), role: 'assistant', content: '⏹ Stopped.', abstained: true, trace: [] });
    } else {
      S.turns.push({ id: Date.now(), role: 'assistant', content: `Connection failed: ${e.message}`, abstained: true, trace: [] });
    }
    S.busy = false; _abort = null;
    toggleComposerButtons(false);
    renderThread(); scrollThread(); loadSessions();
    return;
  }

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    S.turns.push({ id: Date.now(), role: 'assistant', content: `Request failed: ${err.detail || response.statusText}`, abstained: true, trace: [] });
    S.busy = false; _abort = null;
    toggleComposerButtons(false);
    renderThread(); scrollThread(); loadSessions();
    return;
  }

  // --- read the SSE stream ---
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  const liveTurnId = 'live-' + Date.now();
  const liveSteps = [];

  // Insert a placeholder bot turn that will be updated live.
  S.turns.push({ id: liveTurnId, role: 'assistant', content: '', abstained: false, citations: [], scores: null, trace: [], reasoning_steps: liveSteps, live: true });
  renderThread(); scrollThread();

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // SSE frames are separated by double newlines.
      const parts = buffer.split('\n\n');
      buffer = parts.pop() || '';  // last chunk may be incomplete

      for (const part of parts) {
        const lines = part.split('\n');
        const dataLine = lines.find(l => l.startsWith('data: '));
        if (!dataLine) continue;

        let data;
        try { data = JSON.parse(dataLine.slice(6)); }
        catch (_) { continue; }

        switch (data.type) {
          case 'check':
            // History relevance / contextualize — show as a thinking step.
            liveSteps.push({ step: liveSteps.length + 1, tool: data.label || 'check', thought: data.summary || '', params: null, result: null, status: 'done' });
            break;
          case 'plan':
            liveSteps.push({ step: data.step, tool: data.tool, thought: data.thought, params: data.params, result: null, status: 'pending' });
            break;
          case 'tool_result':
            const match = liveSteps.find(s => s.step === data.step && s.tool === data.tool && s.status === 'pending');
            if (match) { match.status = data.status === 'ok' ? 'done' : 'error'; match.summary = data.summary || data.error; match.detail = data.detail || ''; }
            break;
          case 'finalizing':
            // Planner chose final answer — mark all remaining pending steps done.
            liveSteps.forEach(s => { if (s.status === 'pending') s.status = 'done'; });
            break;
          case 'final':
            // Replace the live placeholder with the finished turn.
            const idx = S.turns.findIndex(t => t.id === liveTurnId);
            if (idx !== -1) {
              S.turns[idx] = {
                id: Date.now(), role: 'assistant', content: data.answer,
                abstained: data.abstained, citations: data.citations || [],
                sub_questions: [], scores: data.scores,
                trace: data.trace || [], reasoning_steps: data.reasoning_steps || liveSteps,
              };
            }
            break;
          case 'error':
            const errMatch = liveSteps.find(s => s.step === data.step && s.tool);
            if (errMatch) errMatch.status = 'error';
            break;
        }

        // Re-render the live turn in-place after each event.
        updateLiveTurn(liveTurnId, liveSteps);
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') {
      // Cancelled — the live turn stays with whatever steps were shown.
    } else {
      const idx = S.turns.findIndex(t => t.id === liveTurnId);
      if (idx !== -1) S.turns[idx].content = `Stream error: ${e.message}`;
    }
  } finally {
    S.busy = false; _abort = null;
    toggleComposerButtons(false);
    renderThread(); scrollThread(); loadSessions();
  }
}

// --- live DOM patching during agentic streaming ---
function updateLiveTurn(turnId, steps) {
  const thread = document.getElementById('thread');
  if (!thread) return;
  const turnEl = thread.querySelector(`[data-turn-id="${turnId}"]`);
  if (!turnEl) return;
  const stepsEl = turnEl.querySelector('.agentic-steps');
  if (!stepsEl) return;

  stepsEl.innerHTML = steps.map(s => {
    const cls = s.status === 'pending' ? 'step-pending step-live'
              : s.status === 'error' ? 'step-error'
              : 'step-done';
    return `<div class="agentic-step ${cls}">
      <div class="step-header">
        <span class="step-num">Step ${s.step}</span>
        <span class="step-tool">${esc(s.tool || '')}</span>
        ${s.status === 'pending' ? '<span class="dots"><i></i><i></i><i></i></span>' : ''}
      </div>
      ${s.thought ? `<div class="step-thought">${esc(s.thought)}</div>` : ''}
      ${s.params ? `<div class="step-params">${esc(typeof s.params === 'string' ? s.params : JSON.stringify(s.params))}</div>` : ''}
      ${s.summary ? `<div class="step-result">${esc(s.summary)}</div>` : ''}
      ${s.detail ? `<div class="step-result" style="color:var(--muted);font-size:11px">${esc(s.detail)}</div>` : ''}
    </div>`;
  }).join('');

  // Auto-scroll to latest step.
  stepsEl.scrollTop = stepsEl.scrollHeight;
  scrollThread();
}

function toggleComposerButtons(busy) {
  const send = document.getElementById('send');
  const stop = document.getElementById('stop');
  if (send) send.style.display = busy ? 'none' : '';
  if (stop) stop.style.display = busy ? '' : 'none';
}

function updateHint() {
  const hint = document.querySelector('.hint');
  if (!hint) return;
  const hints = {
    normal: 'ANSWERS ARE GROUNDED IN THIS REPORT ONLY · ENTER TO SEND',
    deep: 'DEEP SEARCH — DECOMPOSES + JUDGES · ENTER TO SEND',
    agentic: 'AGENTIC — PLANNER RESEARCHES STEP BY STEP · ENTER TO SEND',
  };
  hint.textContent = hints[S.mode] || hints.normal;
}

function stopChat() {
  if (!S.busy || !S.session) return;
  // Tell the server to cancel between pipeline stages
  fetch(`/api/sessions/${S.session}/cancel`, { method: 'POST' }).catch(() => {});
  // Unblock the frontend — the in-flight fetch will throw AbortError
  if (_abort) _abort.abort();
}

// ============================================================
// Upload
// ============================================================
document.getElementById('add').onclick = () => document.getElementById('picker').click();
document.getElementById('picker').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  const company = prompt('Company name for this report:', file.name.replace(/\.pdf$/i, ''));
  if (!company) return;
  const fd = new FormData();
  fd.append('company', company); fd.append('file', file);
  fd.append('extract_tables', S.extract_tables ? '1' : '0');
  fd.append('ocr_enabled', S.ocr ? '1' : '0');
  const { id } = await api('/reports', { method: 'POST', body: fd });
  e.target.value = '';
  await loadReports(); selectReport(id);
};

document.getElementById('newchat').onclick = newSession;
document.getElementById('extract-tables-hdr').onclick = e => {
  S.extract_tables = !S.extract_tables;
  const b = e.currentTarget;
  b.dataset.on = S.extract_tables ? '1' : '0';
  b.setAttribute('aria-pressed', String(S.extract_tables));
  b.style.borderColor = S.extract_tables ? 'var(--accent)' : '';
  b.style.color = S.extract_tables ? '' : '';
  b.style.background = S.extract_tables ? '' : '';
  b.querySelector('.switch').style.background = S.extract_tables ? '' : '';
};
document.getElementById('ocr-hdr').onclick = e => {
  S.ocr = !S.ocr;
  const b = e.currentTarget;
  b.dataset.on = S.ocr ? '1' : '0';
  b.setAttribute('aria-pressed', String(S.ocr));
  b.style.borderColor = S.ocr ? 'var(--accent)' : '';
  b.style.color = S.ocr ? '' : '';
  b.style.background = S.ocr ? '' : '';
  b.querySelector('.switch').style.background = S.ocr ? '' : '';
};
// Mode selector — mutually exclusive Normal / Deep / Agentic.
document.querySelectorAll('.mode-btn').forEach(b => {
  b.onclick = () => {
    S.mode = b.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(bb => {
      bb.setAttribute('aria-pressed', String(bb.dataset.mode === S.mode));
    });
    // Update the hint text under the composer.
    updateHint();
  };
});

document.getElementById('verbose').onclick = e => {
  S.verbose = !S.verbose;
  const b = e.currentTarget;
  b.dataset.on = S.verbose ? '1' : '0';
  b.setAttribute('aria-pressed', String(S.verbose));
  // Re-render to show/hide existing trace panels
  if (S.session) renderThread();
};

loadReports().then(renderStage);
loadModels();
</script>
</body>
</html>
