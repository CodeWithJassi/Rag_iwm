# Postgres with pgvector preinstalled. This is the only new service --
# Ollama you already run, and nothing else here needs a container.
#
# Memory config is tuned for vector search: HNSW index builds and queries both
# benefit from large work_mem (in-memory sorts instead of temp files) and a big
# shared_buffers cache (index pages stay hot). Adjust the numbers if your box
# has less than 16 GB RAM; the 2 GB / 64 MB values below are safe for 8 GB.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: iwm
      POSTGRES_PASSWORD: iwm
      POSTGRES_DB: iwm_rag
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    command: >
      -c shared_buffers=2GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
      -c effective_cache_size=6GB
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iwm -d iwm_rag"]
      interval: 5s
      retries: 10

volumes:
  pgdata:
